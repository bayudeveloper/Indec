
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Portofolio</title>
</head>
<body>
    <div id="loginModal">
        <h2>Masukkan Nama dan Umur</h2>
        <input type="text" id="visitorName" placeholder="Nama" required>
        <input type="number" id="visitorAge" placeholder="Umur" required>
        <button onclick="enter()">Masuk</button>
        <p id="errorMessage" style="color:red; display:none;">Masukkan nama dan umur (10–100)!</p>
    </div>
    <div id="mainContent" style="display:none;">
        <h1>Selamat datang, <span id="greetingName"></span> (<span id="greetingAge"></span>)!</h1>
    </div>

    <script>
        function enter() {
            const name = document.getElementById('visitorName').value.trim();
            const age = document.getElementById('visitorAge').value.trim();
            const error = document.getElementById('errorMessage');
            if (name && age >= 10 && age <= 100) {
                localStorage.setItem('visitorName', name);
                localStorage.setItem('visitorAge', age);
                document.getElementById('greetingName').textContent = name;
                document.getElementById('greetingAge').textContent = age;
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                error.style.display = 'none';
            } else {
                error.style.display = 'block';
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('visitorName');
            const savedAge = localStorage.getItem('visitorAge');
            if (savedName && savedAge) {
                document.getElementById('greetingName').textContent = savedName;
                document.getElementById('greetingAge').textContent = savedAge;
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            }
        });
    </script>
</body>
</html>
